<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Save the Date</title>
  <link rel="stylesheet" href="style.css" />
</head>

<body>

  <!-- =========================
       PAGE 1 - ENVELOPPE
  ========================== -->
  <section id="page1" class="page active">

    <div id="envelope" class="envelope open">

      <!-- 🔧 LOGO (modifiable) -->
      <div class="logo-container">
        <img src="logo.png" alt="logo" />
      </div>

      <!-- ENVELOPPE (sans lettre volontairement) -->
      <div class="flap"></div>
      <div class="body"></div>

    </div>

    <!-- 🔧 TEXTE POSITIONNÉ SOUS ENVELOPPE -->
    <p class="hint">
      Clique sur l’enveloppe
    </p>

  </section>


  <!-- =========================
       PAGE 2 - SAVE THE DATE
       (ZONE MODULAIRE)
  ========================== -->
  <section id="page2" class="page">

    <div class="overlay"></div>

    <div class="content">

      <!-- 🔧 TITRE -->
      <h1>SAVE THE DATE</h1>

      <!-- 🔧 DATE -->
      <p class="date-text">00 / 00 / 2026</p>

      <!-- 🔧 ZONE LIBRE PAGE 2 (AJOUT FUTUR CONTENU) -->
      <!-- >>> PAGE 2 CUSTOM CONTENT HERE <<< -->

      <!-- 🔧 BOUTON FORMULAIRE -->
      <a id="formBtn" href="https://TON-LIEN-FORMULAIRE.com" target="_blank">
        Répondre
      </a>

    </div>

  </section>

  <script src="script.js"></script>
</body>
</html>
